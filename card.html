<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork Showcase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            instrument: ['"Instrument Serif"', "serif"],
            syne: ["Syne", "sans-serif"],
            outfit: ["Outfit", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="flex items-center justify-center min-h-screen p-4 bg-stone-50 font-outfit md:p-8"
  style="background-image: radial-gradient(ellipse 700px 500px at 80% -10%, rgba(249,115,22,0.08) 0%, transparent 70%), radial-gradient(ellipse 500px 400px at -10% 80%, rgba(249,115,22,0.06) 0%, transparent 70%);">

  <!-- Card Component -->
  <div id="card"
    class="relative w-full max-w-2xl overflow-hidden transition-all duration-500 bg-white shadow-lg rounded-3xl hover:-translate-y-1">

    <!-- 1. IMAGE (Clickable for fullscreen) -->
    <div class="relative overflow-hidden h-[400px] md:h-[450px] group cursor-pointer">
      <img id="cardImage" src="" alt="artwork"
        class="object-cover w-full h-full transition-transform duration-700 group-hover:scale-105" />

      <!-- Hover overlay -->
      <div
        class="absolute inset-0 transition-opacity duration-300 opacity-0 bg-gradient-to-t from-stone-900/60 via-transparent to-transparent group-hover:opacity-100">
      </div>

      <!-- Zoom icon -->
      <div
        class="absolute flex items-center justify-center w-10 h-10 transition-opacity duration-300 rounded-full opacity-0 bottom-4 right-4 bg-white/90 backdrop-blur-sm group-hover:opacity-100">
        <svg class="w-5 h-5 text-stone-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path>
        </svg>
      </div>
    </div>

    <!-- Content Section -->
    <div class="p-6 md:p-10">

      <!-- Orange accent line -->
      <div class="w-16 h-1 mb-6 bg-orange-500 rounded-full"></div>

      <!-- 2. TITLE -->
      <h1 id="cardTitle"
        class="mb-4 text-4xl font-normal leading-tight tracking-tight font-instrument md:text-5xl text-stone-900">
      </h1>

      <!-- 3. OVERVIEW/PREVIEW -->
      <p id="cardPreview" class="mb-8 text-base italic leading-relaxed text-stone-600 md:text-lg"></p>

      <!-- 4. ARTISTS CREDITS -->
      <div class="p-6 mb-6 border border-orange-100 bg-orange-50 rounded-2xl">
        <p class="mb-4 text-xs font-bold tracking-widest text-orange-800 uppercase font-syne">
          A Creation of the <span class="italic">Following Artist:</span>
        </p>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <!-- Graphic Artist -->
          <div class="flex flex-col gap-1">
            <p class="font-syne text-[0.62rem] font-bold tracking-widest uppercase text-orange-700">
              Graphic Artist
            </p>
            <p id="cardGraphicArtist" class="text-sm font-medium text-stone-900"></p>
          </div>

          <!-- Writer -->
          <div class="flex flex-col gap-1">
            <p class="font-syne text-[0.62rem] font-bold tracking-widest uppercase text-orange-700">
              Writer
            </p>
            <p id="cardWriter" class="text-sm font-medium text-stone-900"></p>
          </div>

          <!-- Videographer -->
          <div class="flex flex-col gap-1">
            <p class="font-syne text-[0.62rem] font-bold tracking-widest uppercase text-orange-700">
              Videographer
            </p>
            <p id="cardVideographer" class="text-sm font-medium text-stone-900"></p>
          </div>

          <!-- Photographer -->
          <div class="flex flex-col gap-1">
            <p class="font-syne text-[0.62rem] font-bold tracking-widest uppercase text-orange-700">
              Photographer
            </p>
            <p id="cardPhotographer" class="text-sm font-medium text-stone-900"></p>
          </div>
        </div>
      </div>

      <!-- 5. DATE -->
      <div class="flex items-center gap-2 mb-8">
        <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        <p class="text-xs font-bold tracking-widest uppercase font-syne text-stone-400">
          Published
        </p>
        <p id="cardDate" class="text-sm text-stone-600"></p>
      </div>

      <!-- 6. SEE MORE BUTTON -->
      <button id="seeMoreBtn"
        class="group w-full flex items-center justify-center gap-3 bg-orange-600 hover:bg-orange-700 text-white font-syne font-bold text-sm tracking-[0.12em] uppercase py-5 px-8 rounded-2xl transition-all duration-300 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-orange-200">
        <span>Explore Full Content</span>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:translate-x-1" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
        </svg>
      </button>

      <!-- DESCRIPTION PANEL -->
      <div id="descriptionPanel" class="mt-6 overflow-hidden transition-all duration-500 ease-in-out opacity-0 max-h-0">

        <!-- Header -->
        <div class="flex items-center justify-between pt-6 mb-4 border-t border-stone-200">
          <div class="flex items-center gap-3">
            <div class="w-1 h-8 bg-orange-500 rounded-full"></div>
            <h3 class="text-2xl font-normal font-instrument text-stone-900">
              The Full Story
            </h3>
          </div>
          <button id="closeDescBtn"
            class="flex items-center justify-center w-10 h-10 transition-colors duration-200 rounded-full bg-stone-100 hover:bg-orange-100">
            <svg class="w-5 h-5 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <!-- Description content -->
        <div class="p-6 border border-orange-100 bg-orange-50 rounded-2xl">
          <p id="cardDescription" class="text-base leading-relaxed text-stone-700"></p>
        </div>
      </div>

    </div>
  </div>

  <!-- FULLSCREEN IMAGE MODAL -->
  <div id="imageModal"
    class="fixed inset-0 z-50 flex items-center justify-center invisible p-4 transition-all opacity-0 cursor-pointer bg-stone-900/95 backdrop-blur-md duration-400">

    <!-- Close button -->
    <button id="closeModalBtn"
      class="absolute z-10 flex items-center justify-center w-12 h-12 transition-all duration-200 rounded-full top-6 right-6 bg-white/10 hover:bg-white/20 backdrop-blur-sm">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <!-- Image info overlay -->
    <div class="absolute z-10 max-w-2xl p-6 mx-auto bottom-6 left-6 right-6 bg-white/10 backdrop-blur-md rounded-2xl">
      <h2 id="modalTitle" class="mb-3 text-3xl font-normal text-white font-instrument"></h2>
      <div class="flex flex-wrap gap-4 text-sm">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-orange-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
          <span id="modalGraphicArtist" class="font-medium text-orange-200"></span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-orange-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
            </path>
          </svg>
          <span id="modalWriter" class="font-medium text-orange-200"></span>
        </div>
      </div>
    </div>

    <!-- Fullscreen image -->
    <img id="modalImage" src="" alt="artwork" class="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl" />
  </div>

  <script type="module" src="card.js"></script>
</body>

</html>
