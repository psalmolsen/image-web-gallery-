<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Artwork Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&family=Playfair+Display:ital,wght@1,700&family=EB+Garamond:wght@600&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fraunces: ["Fraunces", "serif"],
            instrument: ['"Instrument Serif"', "serif"],
            syne: ["Syne", "sans-serif"],
            outfit: ["Outfit", "sans-serif"],
            cursive: ["Playfair Display", "serif"],
            mage: ["EB Garamond", "serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen bg-[#FFF7ED] font-outfit"
  style="background-image: radial-gradient(ellipse 700px 500px at 80% -10%, rgba(249,115,22,0.08) 0%, transparent 70%), radial-gradient(ellipse 500px 400px at -10% 80%, rgba(249,115,22,0.06) 0%, transparent 70%);">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white border-b shadow-sm border-stone-200">
    <div class="px-4 py-3 mx-auto max-w-7xl">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="flex items-center justify-center flex-shrink-0 w-10 h-10 rounded-full bg-gradient-to-br from-orange-400 to-orange-600">
            <span><img alt="iMAGE logo" src="imgs/image_logo.jpg" /></span>
          </div>
          <h1 class="text-xl font-bold text-stone-900">
            <em
              class="italic text-[1.45rem] font-cursive text-orange-600 inline-block leading-none translate-y-[0.5px] -mr-0.6">i</em><span
              class="font-mage font-bold tracking-[0.06em] inline-block text-[1.45rem] translate-y-[0.5px]">MAGE</span>
          </h1>
        </div>
        <!-- menu -->
        <button
          class="flex items-center justify-center w-10 h-10 transition-colors duration-200 rounded-full hover:bg-stone-100"
          id="menu_button">
          <svg class="w-6 h-6 text-stone-600" fill="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="5" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="12" cy="19" r="2"></circle>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Search Bar -->
  <div class="bg-white border-b border-stone-200">
    <div class="px-4 py-3 mx-auto max-w-7xl">
      <div class="relative">
        <svg class="absolute w-5 h-5 -translate-y-1/2 left-3 top-1/2 text-stone-400" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round"
            stroke-width="2"></path>
        </svg>
        <input
          class="w-full pl-10 pr-4 py-2.5 bg-stone-100 border-0 rounded-xl text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200"
          id="searchInput" placeholder="Search Artworks" type="text" />
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="px-4 py-6 pb-24 mx-auto max-w-7xl">

    <!-- Empty State -->
    <div class="hidden py-20 text-center bg-white border shadow-sm rounded-3xl border-stone-100" id="emptyState">
      <div class="flex items-center justify-center w-20 h-20 mx-auto mb-4 bg-orange-100 rounded-full">
        <svg class="w-10 h-10 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
            stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          </path>
        </svg>
      </div>
      <h3 class="mb-2 text-2xl font-normal font-instrument text-stone-900">No artworks yet</h3>
      <p class="mb-6 text-sm text-stone-500">Start by publishing your first collaboration</p>
      <a class="inline-flex items-center gap-2 bg-orange-600 hover:bg-orange-700 text-white font-syne font-bold text-sm tracking-wider uppercase py-3 px-6 rounded-xl transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-orange-200"
        href="posting.html">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
        <span>Create Artwork</span>
      </a>
    </div>

    <!-- Artwork Grid -->
    <div class="columns-1 md:columns-2 lg:columns-3 gap-6 [&>*]:break-inside-avoid [&>*]:mb-6" id="layout"></div>

  </main>

  <!-- Bottom Navigation Bar -->
  <footer class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t shadow-lg border-stone-200">
    <div class="px-4 mx-auto max-w-7xl">
      <div class="flex items-center justify-around py-2">
        <!-- Works -->
        <button
          class="flex flex-col items-center gap-1 px-4 py-2 transition-colors duration-200 hover:bg-orange-50 rounded-xl"
          id="nav-works">
          <div class="flex items-center justify-center w-6 h-6">
            <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              </path>
            </svg>
          </div>
          <span class="text-xs font-medium text-orange-600 font-outfit">Works</span>
        </button>
        <!-- About Us -->
        <button
          class="flex flex-col items-center gap-1 px-4 py-2 transition-colors duration-200 hover:bg-orange-50 rounded-xl"
          id="nav-about">
          <div class="flex items-center justify-center w-6 h-6">
            <svg class="w-6 h-6 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"></path>
            </svg>
          </div>
          <span class="text-xs font-medium font-outfit text-stone-400">About Us</span>
        </button>
      </div>
    </div>
  </footer>

  <!-- + New Artwork -->
  <a class="fixed z-40 flex items-center justify-center text-white transition-all duration-300 bg-orange-600 rounded-full shadow-xl bottom-20 right-6 w-14 h-14 hover:bg-orange-700 hover:shadow-2xl hover:scale-110 hover:-translate-y-1"
    href="posting.html">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
    </svg>
  </a>

  <!-- Share Bottom Sheet overlay -->
  <div class="fixed inset-0 bg-black/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"
    id="shareSheetOverlay"></div>

  <!-- Share Bottom Sheet
  <div

    <div class="px-5 pt-4 pb-2">
      <div class="mx-auto h-1.5 w-12 rounded-full bg-stone-200"></div>
      <h3 class="mt-4 text-base font-bold font-syne text-stone-900">Share this artwork</h3>
    </div>
    <div class="px-5 pb-4 flex flex-col gap-2">

        class="w-full flex items-center gap-3 px-4 py-3 text-sm text-orange-600 hover:bg-orange-50 rounded-xl transition-colors duration-150"

  <script src="dashboard.js" type="module"></script>
</body>

</html>
