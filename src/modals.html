<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    /* ── QR Corner brackets ── */
    .qr-corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #e8874a;
      border-style: solid;
      pointer-events: none;
    }

    .qr-corner-tl {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 3px 0 0 0;
    }

    .qr-corner-tr {
      top: -1px;
      right: -1px;
      border-width: 2px 2px 0 0;
      border-radius: 0 3px 0 0;
    }

    .qr-corner-bl {
      bottom: -1px;
      left: -1px;
      border-width: 0 0 2px 2px;
      border-radius: 0 0 0 3px;
    }

    .qr-corner-br {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 3px 0;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- FULL CONTENT MODAL -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4"
    id="fullSheetOverlay">

    <!-- Modal Card -->
    <div
      class="bg-[#141414] border border-[#2a2a2a] rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] overflow-y-auto scale-95 opacity-0 transition-all duration-300"
      id="fullSheet" style="transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1);">

      <!-- Close button (top right) -->
      <button
        class="absolute top-4 right-4 w-8 h-8 rounded-full bg-[#1e1e1e] border border-[#2a2a2a] flex items-center justify-center text-[#6b6460] hover:text-[#e2d9cf] transition-colors z-10"
        id="fullSheetClose">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>

      <!-- Content container -->
      <div class="p-6 flex flex-col gap-4">

        <!-- Media area -->
        <div class="w-full aspect-video rounded-xl overflow-hidden bg-[#1e1e1e] hidden" id="fullSheetMedia">
          <img class="w-full h-full object-contain hidden cursor-pointer" id="fullSheetImage" />
          <video class="w-full h-full object-contain hidden cursor-pointer" id="fullSheetVideo" controls></video>
        </div>

        <!-- Category + Date -->
        <div class="flex items-center gap-3 flex-wrap">
          <span
            class="text-[9px] font-syne font-bold tracking-widest uppercase text-[#e8874a] bg-[#e8874a]/15 border border-[#e8874a]/25 rounded-full px-3 py-1"
            id="fullSheetCategory"></span>
          <span class="text-xs font-outfit text-[#6b6460]" id="fullSheetDate"></span>
        </div>

        <!-- Title -->
        <h2 class="font-fraunces text-2xl italic font-semibold text-[#e2d9cf]" id="fullSheetTitle"></h2>

        <!-- Divider -->
        <div class="w-full h-[1.5px] bg-[#e8874a]/35 rounded-full"></div>

        <!-- Full Content -->
        <div id="fullSheetFullContentWrap">
          <p class="text-[10px] font-syne font-bold tracking-widest uppercase text-[#6b6460] mb-2">FULL CONTENT</p>
          <p class="text-sm font-outfit text-[#9a8f8a] leading-relaxed" id="fullSheetFullContent"></p>
        </div>

        <!-- Artists -->
        <div>
          <p class="text-[10px] font-syne font-bold tracking-widest uppercase text-[#6b6460] mb-3">ARTISTS</p>
          <div class="grid grid-cols-2 gap-2" id="fullSheetArtists"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- MEDIA VIEWER MODAL -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[80] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center"
    id="mediaViewerOverlay">

    <!-- Close button -->
    <button
      class="absolute top-4 right-4 w-10 h-10 rounded-full bg-[#1e1e1e]/80 border border-[#2a2a2a] flex items-center justify-center text-[#6b6460] hover:text-[#e2d9cf] transition-colors z-10"
      id="mediaViewerClose">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
      </svg>
    </button>

    <!-- Counter -->
    <div
      class="absolute top-4 left-4 px-3 py-1.5 rounded-full bg-[#1e1e1e]/80 border border-[#2a2a2a] text-xs font-outfit text-stone-200 z-10"
      id="mediaViewerCounter">1 / 1</div>

    <!-- Previous button (desktop only) -->
    <button
      class="hidden md:flex absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-[#1e1e1e]/80 border border-[#2a2a2a] items-center justify-center text-stone-200 hover:text-orange-500 transition-colors opacity-0 pointer-events-none"
      id="mediaViewerPrev">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" />
      </svg>
    </button>

    <!-- Next button (desktop only) -->
    <button
      class="hidden md:flex absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-[#1e1e1e]/80 border border-[#2a2a2a] items-center justify-center text-stone-200 hover:text-orange-500 transition-colors opacity-0 pointer-events-none"
      id="mediaViewerNext">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" />
      </svg>
    </button>

    <!-- Media container -->
    <div class="w-full h-full flex items-center justify-center p-4" id="mediaViewerContainer">
      <img class="max-w-full max-h-full object-contain hidden" id="mediaViewerImage" />
      <video class="max-w-full max-h-full object-contain hidden" id="mediaViewerVideo" controls autoplay></video>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- QR CODE MODAL (redesigned) -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-4"
    id="qrModalOverlay">

    <div class="relative flex flex-col items-center gap-3" id="qrModalCard">

      <!-- Close button -->
      <button
        class="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-[#1e1e1e] border border-[#2a2a2a] flex items-center justify-center text-[#6b6460] hover:text-[#e2d9cf] transition-colors z-10"
        id="qrModalClose">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>

      <!-- QR Card -->
      <div class="relative bg-[#141414] border border-[#2a2a2a] rounded-2xl overflow-hidden" style="width: 360px;"
        id="qrCard">

        <!-- Orange top accent bar -->
        <div class="w-full h-[3px]" style="background: linear-gradient(90deg, #e8874a 0%, #c0451a 100%);"></div>

        <!-- Header -->
        <div class="flex items-center gap-3 px-5 pt-5 pb-4 border-b border-[#2a2a2a]">

          <!-- Logo ring -->
          <div
            class="w-[42px] h-[42px] rounded-full border border-[#e8874a] bg-[#1e1e1e] flex items-center justify-center shrink-0 overflow-hidden">
            <img src="imgs/image_logo.jpg" alt="iMAGE Logo" class="w-[38px] h-[38px] rounded-full object-cover"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <span class="hidden font-fraunces italic text-[#e8874a] text-sm font-semibold">iM</span>
          </div>

          <!-- Brand text -->
          <div>
            <h1 class="font-fraunces italic font-semibold text-[#e2d9cf] text-2xl leading-none tracking-wide"><span
                class="text-[#e8874a]">i</span>MAGE</h1>
            <p class="font-syne text-[8px] font-bold tracking-[0.22em] uppercase text-[#6b6460] mt-1">
              CVSU Carmona &nbsp;·&nbsp; Artwork Gallery
            </p>
          </div>
        </div>

        <!-- QR Body -->
        <div class="flex flex-col items-center px-6 pt-5 pb-4 gap-4">

          <p class="font-syne text-[8px] font-bold tracking-[0.22em] uppercase text-[#6b6460] self-start">
            Artwork QR Code
          </p>

          <!-- QR frame with corner brackets -->
          <div class="relative" style="width: 268px; height: 268px;">
            <span class="qr-corner qr-corner-tl"></span>
            <span class="qr-corner qr-corner-tr"></span>
            <span class="qr-corner qr-corner-bl"></span>
            <span class="qr-corner qr-corner-br"></span>

            <!-- White inner QR area -->
            <div class="absolute bg-white rounded-md flex items-center justify-center overflow-hidden"
              style="inset: 8px;">
              <canvas id="qrCanvas" width="252" height="252"></canvas>

              <!-- Center logo overlay -->
              <div class="absolute flex items-center justify-center bg-white rounded-full overflow-hidden"
                style="width: 48px; height: 48px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #fff;">
                <img src="imgs/image_logo.jpg" alt="iMAGE Logo" class="w-11 h-11 rounded-full object-cover"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span class="hidden font-fraunces italic text-[#c0451a] text-xs font-semibold">iM</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="px-5 pb-5 flex flex-col gap-2">
          <div class="w-full h-px bg-[#2a2a2a]"></div>

          <!-- URL pill -->
          <div class="flex items-center gap-2 bg-[#1e1e1e] border border-[#2a2a2a] rounded-full px-4 py-2">
            <div class="w-[6px] h-[6px] rounded-full bg-[#e8874a] shrink-0"></div>
            <span id="qrDomain" class="font-outfit text-[11px] text-[#9a8f8a] tracking-wide truncate">
            </span>
          </div>

          <p class="font-syne text-[8px] font-bold tracking-[0.2em] uppercase text-[#e8874a] text-center opacity-70">
            Scan to view artwork
          </p>
        </div>

      </div>
      <!-- end #qrCard -->

      <!-- Download button -->
      <button
        class="flex items-center justify-center gap-2 bg-[#1e1e1e] border border-[#2a2a2a] rounded-xl py-3 transition-all duration-200 hover:bg-[#e8874a]/10 hover:border-[#e8874a]/50"
        style="width: 360px;" id="qrDownloadBtn">
        <svg class="w-4 h-4 text-[#e8874a]" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        <span class="font-syne text-[10px] font-bold tracking-[0.22em] uppercase text-[#e8874a]">
          Download QR Code
        </span>
      </button>

    </div>
  </div>
  <!-- end #qrModalOverlay -->

</body>

</html>
