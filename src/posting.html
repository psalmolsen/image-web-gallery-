<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publish Artwork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,700&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            fraunces: ["Fraunces", "serif"],
            syne: ["Syne", "sans-serif"],
            outfit: ["Outfit", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen bg-[#0a0a0a] font-outfit text-[#e2d9cf]">

  <div class="mx-auto max-w-2xl px-6 py-14 pb-24">
    <header class="mb-14">
      <div class="mb-3 flex items-center gap-3">
        <span class="block h-0.5 w-7 rounded-full bg-[#e8874a]"></span>
        <p class="font-syne text-xs font-bold uppercase tracking-[0.18em] text-[#e8874a]">Image Artwork Gallery</p>
      </div>
      <h1 class="font-fraunces text-6xl font-semibold leading-none tracking-tight text-white">
        Publish <br />
        <em class="italic text-[#e8874a]">Artwork</em>
      </h1>
      <p class="mt-3 text-sm font-light tracking-wide text-[#9a8f8a]">
        Share the creative work to the organization gallery
      </p>
    </header>

    <div id="Inputs" class="flex flex-col gap-5">
      <div id="FIle" class="File_Upload">
        <label class="mb-3 block font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
          Upload Artwork
        </label>
        <label for="FileInput"
          class="group relative flex min-h-[160px] cursor-pointer flex-col items-center justify-center gap-3 overflow-hidden rounded-[1.75rem] border-2 border-dashed border-[#2a2a2a] bg-[#141414] transition-all duration-300 hover:border-[#e8874a]">
          <div id="dropzoneDefault" class="flex flex-col items-center gap-3">
            <div
              class="flex h-14 w-14 items-center justify-center rounded-full border border-[#2a2a2a] bg-[#1f1f1f] text-2xl transition-transform duration-300 group-hover:scale-105">
              <svg class="h-6 w-6 text-[#e8874a]" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                  d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551" />
              </svg>
            </div>
            <div class="text-center">
              <p class="font-syne text-sm font-semibold text-[#c4b4a5]">
                <span class="text-[#e8874a]">Choose file</span> or drag &amp; drop
              </p>
              <p class="mt-1 text-xs tracking-wide text-[#6b6460]">PNG / JPG / MP4</p>
            </div>
          </div>
          <div id="filePreviewContainer" class="mt-4 flex flex-wrap gap-3"></div>
          <input type="file" id="FileInput" multiple
            class="absolute inset-0 z-10 h-full w-full cursor-pointer opacity-0" />
        </label>
      </div>
    </div>

    <div id="Title" class="mt-5 flex flex-col gap-2">
      <label class="font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
        Title
      </label>
      <input type="text" id="titleInput" placeholder="Enter artwork title" autocomplete="off"
        class="w-full border-0 border-b-2 border-[#2a2a2a] bg-transparent py-3 text-base text-[#e2d9cf] font-outfit outline-none transition-colors duration-200 placeholder-[#6b6460] focus:border-[#e8874a]" />
    </div>

    <div id="Preview" class="mt-5 flex flex-col gap-2">
      <label class="font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
        Preview / Overview
      </label>
      <textarea id="overview" placeholder="Short preview text" rows="3"
        class="w-full resize-none border-0 border-b-2 border-[#2a2a2a] bg-transparent py-3 text-base leading-relaxed text-[#e2d9cf] font-outfit outline-none transition-colors duration-200 placeholder-[#6b6460] focus:border-[#e8874a]"></textarea>
    </div>

    <div id="FullContent" class="mt-5 flex flex-col gap-2">
      <label class="font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
        Full Content
      </label>
      <textarea id="descriptionInput" placeholder="Share the whole content here..." rows="6"
        class="w-full resize-none border-0 border-b-2 border-[#2a2a2a] bg-transparent py-3 text-base leading-relaxed text-[#e2d9cf] font-outfit outline-none transition-colors duration-200 placeholder-[#6b6460] focus:border-[#e8874a]"></textarea>
    </div>

    <div class="mt-5 flex flex-col gap-2">
      <label class="font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
        Date Created
      </label>
      <div class="flex items-center gap-3 border-b-2 border-[#2a2a2a] py-3 transition-colors duration-200 focus-within:border-[#e8874a]">
        <svg class="h-5 w-5 shrink-0 text-[#e8874a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <input type="date" id="Date"
          class="w-full cursor-pointer bg-transparent text-base text-[#e2d9cf] font-outfit outline-none" />
      </div>
    </div>

    <div id="Artists"
      class="mt-8 rounded-[1.75rem] border border-[#1f1f1f] bg-[#141414] p-6 shadow-[0_18px_45px_rgba(0,0,0,0.18)] md:p-8">
      <h3 class="mb-5 border-b border-[#2a2a2a] pb-4 font-fraunces text-lg text-white md:mb-6 md:pb-5 md:text-xl">
        A Creation of the <em class="italic text-[#e8874a]">Following Artist:</em>
      </h3>

      <div class="grid grid-cols-1 gap-x-10 gap-y-6 md:grid-cols-2">
        <div class="flex flex-col gap-2" data-role="graphicartist">
          <label
            class="whitespace-nowrap font-syne text-[0.58rem] font-bold uppercase tracking-[0.14em] text-[#c4b4a5] md:text-[0.62rem] md:tracking-[0.16em]">
            Graphic Artist
          </label>
          <div class="artist-inputs flex flex-col gap-2">
            <div class="artist-row flex items-center gap-2 border-b-2 border-[#2a2a2a] transition-colors duration-200 focus-within:border-[#e8874a]">
              <input type="text" placeholder="Enter graphic artist name"
                class="flex-1 bg-transparent py-2.5 text-sm text-[#e2d9cf] placeholder-[#6b6460] font-outfit outline-none" />
              <button type="button"
                class="artist-btn shrink-0 flex h-6 w-6 items-center justify-center rounded-full border border-[#e8874a]/35 bg-[#e8874a]/10 text-xs font-bold text-[#e8874a] transition-all duration-200 hover:bg-[#e8874a] hover:text-[#1a0903]">+</button>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2" data-role="writer">
          <label
            class="whitespace-nowrap font-syne text-[0.58rem] font-bold uppercase tracking-[0.14em] text-[#c4b4a5] md:text-[0.62rem] md:tracking-[0.16em]">
            Writer
          </label>
          <div class="artist-inputs flex flex-col gap-2">
            <div class="artist-row flex items-center gap-2 border-b-2 border-[#2a2a2a] transition-colors duration-200 focus-within:border-[#e8874a]">
              <input type="text" placeholder="Enter writer name"
                class="flex-1 bg-transparent py-2.5 text-sm text-[#e2d9cf] placeholder-[#6b6460] font-outfit outline-none" />
              <button type="button"
                class="artist-btn shrink-0 flex h-6 w-6 items-center justify-center rounded-full border border-[#e8874a]/35 bg-[#e8874a]/10 text-xs font-bold text-[#e8874a] transition-all duration-200 hover:bg-[#e8874a] hover:text-[#1a0903]">+</button>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2" data-role="videographer">
          <label
            class="whitespace-nowrap font-syne text-[0.58rem] font-bold uppercase tracking-[0.14em] text-[#c4b4a5] md:text-[0.62rem] md:tracking-[0.16em]">
            Videographer
          </label>
          <div class="artist-inputs flex flex-col gap-2">
            <div class="artist-row flex items-center gap-2 border-b-2 border-[#2a2a2a] transition-colors duration-200 focus-within:border-[#e8874a]">
              <input type="text" placeholder="Enter videographer name"
                class="flex-1 bg-transparent py-2.5 text-sm text-[#e2d9cf] placeholder-[#6b6460] font-outfit outline-none" />
              <button type="button"
                class="artist-btn shrink-0 flex h-6 w-6 items-center justify-center rounded-full border border-[#e8874a]/35 bg-[#e8874a]/10 text-xs font-bold text-[#e8874a] transition-all duration-200 hover:bg-[#e8874a] hover:text-[#1a0903]">+</button>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2" data-role="photographer">
          <label
            class="whitespace-nowrap font-syne text-[0.58rem] font-bold uppercase tracking-[0.14em] text-[#c4b4a5] md:text-[0.62rem] md:tracking-[0.16em]">
            Photographer
          </label>
          <div class="artist-inputs flex flex-col gap-2">
            <div class="artist-row flex items-center gap-2 border-b-2 border-[#2a2a2a] transition-colors duration-200 focus-within:border-[#e8874a]">
              <input type="text" placeholder="Enter photographer name"
                class="flex-1 bg-transparent py-2.5 text-sm text-[#e2d9cf] placeholder-[#6b6460] font-outfit outline-none" />
              <button type="button"
                class="artist-btn shrink-0 flex h-6 w-6 items-center justify-center rounded-full border border-[#e8874a]/35 bg-[#e8874a]/10 text-xs font-bold text-[#e8874a] transition-all duration-200 hover:bg-[#e8874a] hover:text-[#1a0903]">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-8 rounded-[1.5rem] border border-[#1f1f1f] bg-[#171717] p-8">
        <label class="mb-4 block font-syne text-[0.65rem] font-bold uppercase tracking-[0.16em] text-[#c4b4a5]">
          Artwork Category
        </label>
        <div class="relative">
          <select id="category"
            class="w-full appearance-none border-0 border-b-2 border-[#2a2a2a] bg-transparent py-3 pr-10 text-base text-[#e2d9cf] font-outfit outline-none transition-colors duration-200 cursor-pointer focus:border-[#e8874a]">
            <option value="" disabled selected hidden>Select category</option>
            <option value="newCategory">+ Add Category</option>
          </select>
          <span class="pointer-events-none absolute right-1 top-1/2 -translate-y-1/2 text-[#e8874a]">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M7 10l5 5 5-5" />
            </svg>
          </span>
        </div>

        <div id="collabField" class="mt-6 hidden rounded-2xl border border-[#e8874a]/20 bg-[#e8874a]/8 p-5">
          <label class="mb-3 block font-syne text-[0.62rem] font-bold uppercase tracking-[0.16em] text-[#e8874a]">
            Collaboration Project Name
          </label>
          <input type="text" id="collabName" placeholder=" e.g. Liwanag sa Dilim"
            class="mb-4 w-full border-0 border-b-2 border-[#e8874a]/25 bg-transparent py-2.5 text-sm text-[#e2d9cf] placeholder-[#9a8f8a] font-outfit outline-none transition-colors duration-200 focus:border-[#e8874a]" />
          <button id="add_collab_button"
            class="inline-flex items-center gap-2 rounded-full border border-[#e8874a] bg-transparent px-5 py-2.5 font-syne text-xs font-bold uppercase tracking-widest text-[#e8874a] transition-all duration-200 hover:bg-[#e8874a] hover:text-[#1a0903]">
            <span>+</span> Add as Category
          </button>
        </div>
      </div>

      <div class="pt-6">
        <button type="button" id="publishBtn"
          class="flex w-full items-center justify-center gap-3 rounded-2xl bg-[#e8874a] px-8 py-5 font-syne text-sm font-bold uppercase tracking-[0.12em] text-[#1a0903] transition-all duration-300 disabled:cursor-not-allowed disabled:opacity-40 disabled:transform-none">
          <span>Publish Artwork</span>
          <span
            class="flex h-7 w-7 items-center justify-center rounded-full bg-[#1a0903]/10 text-sm">
            >
          </span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="posting.js"></script>
</body>

</html>
